version: 2

project_name: spor

before:
  hooks:
    - go mod download

builds:
  - id: spor
    main: ./cmd/spor
    binary: spor
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: spor
    # Produces e.g. spor_0.10.0_linux_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: spor
    repository:
      owner: emprcl
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/emprcl/spor"
    description: "Simple, automatic versioning tool for exploratory work"
    license: "MIT"
    install: |
      bin.install "spor"
    test: |
      system "#{bin}/spor", "--version"

release:
  github:
    owner: emprcl
    name: spor
